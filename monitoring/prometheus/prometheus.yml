global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'nextjs-frontend'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['frontend:3000']

  - job_name: 'fastapi-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
